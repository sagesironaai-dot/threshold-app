# Dependabot version updates
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Strategy: weekly checks on Mondays, grouped minor/patch updates to minimize PR noise.
# Security updates (separate feature) run continuously and are not affected by this config.

version: 2
updates:
  # Frontend JavaScript/TypeScript (SvelteKit, Vite, etc.)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      frontend-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Backend Python (FastAPI, SQLAlchemy, pgvector, etc.)
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      backend-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Docker images referenced in docker-compose.yml (Postgres, Redis, Ollama, etc.)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3

  # GitHub Actions pinned in .github/workflows/*.yml
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
